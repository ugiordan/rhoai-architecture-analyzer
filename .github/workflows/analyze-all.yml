name: Analyze All Components

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout analyzer
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build analyzer
        run: go build -o rhoai-analyzer ./cmd/rhoai-analyzer/

      - name: Analyze all repositories
        run: |
          mkdir -p results
          grep '^ *- ' scan-config.yaml | sed 's/^ *- //' | while read -r repo; do
            echo "=== Analyzing ${repo} ==="
            bash scripts/analyze-repo.sh "${repo}" results || echo "[!] Failed: ${repo}"
          done

      - name: Aggregate platform architecture
        run: ./rhoai-analyzer aggregate results --output-dir platform-output

      - name: Upload component results
        uses: actions/upload-artifact@v4
        with:
          name: component-results
          path: results/
          retention-days: 90

      - name: Upload platform results
        uses: actions/upload-artifact@v4
        with:
          name: platform-results
          path: platform-output/
          retention-days: 90
