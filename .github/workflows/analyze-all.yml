name: Analyze All Components

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to analyze (odh, rhoai, or all)'
        required: false
        default: 'all'
      version:
        description: 'Version label for snapshot (e.g. v2.15.0). Defaults to date stamp if empty.'
        required: false
        default: ''

concurrency: snapshots

permissions:
  contents: read

jobs:
  parse-config:
    runs-on: ubuntu-latest
    outputs:
      odh-repos: ${{ steps.parse.outputs.odh-repos }}
      rhoai-repos: ${{ steps.parse.outputs.rhoai-repos }}
      run-odh: ${{ steps.parse.outputs.run-odh }}
      run-rhoai: ${{ steps.parse.outputs.run-rhoai }}
    steps:
      - uses: actions/checkout@v6
      - name: Parse scan-config.yaml
        id: parse
        run: |
          platform="${{ inputs.platform || 'all' }}"

          # Expand org/repo pairs from the nested config structure
          # .platforms.<platform>.orgs.<org>[*] -> "<org>/<repo>"
          expand_repos() {
            local plat="$1"
            yq -r ".platforms.${plat}.orgs | to_entries[] | .key as \$org | .value[] | \"\(\$org)/\(.)\"" scan-config.yaml \
              | jq -R -s -c 'split("\n") | map(select(length > 0))'
          }

          odh_repos=$(expand_repos odh)
          rhoai_repos=$(expand_repos rhoai)

          echo "odh-repos=${odh_repos}" >> "$GITHUB_OUTPUT"
          echo "rhoai-repos=${rhoai_repos}" >> "$GITHUB_OUTPUT"

          if [ "$platform" = "all" ] || [ "$platform" = "odh" ]; then
            echo "run-odh=true" >> "$GITHUB_OUTPUT"
          else
            echo "run-odh=false" >> "$GITHUB_OUTPUT"
          fi

          if [ "$platform" = "all" ] || [ "$platform" = "rhoai" ]; then
            echo "run-rhoai=true" >> "$GITHUB_OUTPUT"
          else
            echo "run-rhoai=false" >> "$GITHUB_OUTPUT"
          fi

  analyze-odh:
    needs: parse-config
    if: needs.parse-config.outputs.run-odh == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        repo: ${{ fromJson(needs.parse-config.outputs.odh-repos) }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
      - name: Build analyzer
        run: go build -o arch-analyzer ./cmd/arch-analyzer/
      - name: Analyze ${{ matrix.repo }}
        run: |
          mkdir -p results
          timeout 900 bash scripts/analyze-repo.sh "${{ matrix.repo }}" results || echo "[!] Failed or timed out: ${{ matrix.repo }}"
      - name: Upload result
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: odh-result-${{ strategy.job-index }}
          path: results/
          if-no-files-found: ignore
          retention-days: 7

  analyze-rhoai:
    needs: parse-config
    if: needs.parse-config.outputs.run-rhoai == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        repo: ${{ fromJson(needs.parse-config.outputs.rhoai-repos) }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
      - name: Build analyzer
        run: go build -o arch-analyzer ./cmd/arch-analyzer/
      - name: Analyze ${{ matrix.repo }}
        run: |
          mkdir -p results
          timeout 900 bash scripts/analyze-repo.sh "${{ matrix.repo }}" results || echo "[!] Failed or timed out: ${{ matrix.repo }}"
      - name: Upload result
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: rhoai-result-${{ strategy.job-index }}
          path: results/
          if-no-files-found: ignore
          retention-days: 7

  aggregate-and-deploy:
    needs: [parse-config, analyze-odh, analyze-rhoai]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Determine version label
        id: version
        run: |
          ver="${{ inputs.version }}"
          if [ -z "$ver" ]; then
            ver="$(date -u +%Y-%m-%d)"
          fi
          echo "label=${ver}" >> "$GITHUB_OUTPUT"
          # Check if this is a date-stamped version (for retention pruning)
          if echo "$ver" | grep -qE '^[0-9]{4}-[0-9]{2}-[0-9]{2}$'; then
            echo "is_dated=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_dated=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build analyzer
        run: go build -o arch-analyzer ./cmd/arch-analyzer/

      - name: Download ODH results
        if: needs.analyze-odh.result != 'skipped'
        uses: actions/download-artifact@v8
        with:
          pattern: odh-result-*
          path: odh-results/
          merge-multiple: true

      - name: Download RHOAI results
        if: needs.analyze-rhoai.result != 'skipped'
        uses: actions/download-artifact@v8
        with:
          pattern: rhoai-result-*
          path: rhoai-results/
          merge-multiple: true

      - name: Aggregate and generate docs
        run: |
          VERSION="${{ steps.version.outputs.label }}"

          if [ -d odh-results ] && [ "$(ls -A odh-results)" ]; then
            echo "=== Aggregating ODH ==="
            ./arch-analyzer aggregate -output-dir platform-output/odh -version "$VERSION" -platform odh odh-results
            echo "=== Generating ODH docs ==="
            ./arch-analyzer docs -output-dir site/docs/odh-platform -prefix odh-platform \
              "platform-output/odh/${VERSION}/platform-architecture.json"
          fi

          if [ -d rhoai-results ] && [ "$(ls -A rhoai-results)" ]; then
            echo "=== Aggregating RHOAI ==="
            ./arch-analyzer aggregate -output-dir platform-output/rhoai -version "$VERSION" -platform rhoai rhoai-results
            echo "=== Generating RHOAI docs ==="
            ./arch-analyzer docs -output-dir site/docs/rhoai-platform -prefix rhoai-platform \
              "platform-output/rhoai/${VERSION}/platform-architecture.json"
          fi

      - name: Upload platform artifacts
        uses: actions/upload-artifact@v7
        with:
          name: platform-results
          path: platform-output/
          retention-days: 90

      - name: Generate platform nav
        run: python3 scripts/generate-nav.py site/docs site/mkdocs.yml

      - name: Commit generated platform docs to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add site/docs/*-platform/ site/mkdocs.yml docs/
          if git diff --cached --quiet; then
            echo "No platform doc changes to commit"
          else
            git commit -m "chore: update generated platform docs [skip ci]"
            git push origin main
          fi

      - name: Install MkDocs dependencies
        run: pip install -r site/requirements.txt

      - name: Deploy to GitHub Pages
        working-directory: site
        run: mkdocs gh-deploy --force

      - name: Publish snapshot to snapshots branch
        run: |
          VERSION="${{ steps.version.outputs.label }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Create or switch to snapshots branch using a worktree
          SNAP_DIR="/tmp/snapshots-worktree"
          rm -rf "$SNAP_DIR"
          if git ls-remote --heads origin snapshots | grep -q snapshots; then
            git fetch origin snapshots
            git worktree add "$SNAP_DIR" origin/snapshots
          else
            git worktree add --orphan -b snapshots "$SNAP_DIR"
          fi

          # Copy versioned output
          if [ -d platform-output ] && [ "$(ls -A platform-output)" ]; then
            mkdir -p "$SNAP_DIR/output/${VERSION}"
            cp -r platform-output/* "$SNAP_DIR/output/${VERSION}/"
          else
            echo "No platform output to snapshot"
            exit 0
          fi

          # Commit and tag
          (
            cd "$SNAP_DIR"
            git add "output/${VERSION}/"
            git commit -m "snapshot: ${VERSION}" || echo "No changes to commit"
            git tag -f "arch/${VERSION}"
          )

          # Push branch and tag
          (cd "$SNAP_DIR" && git push origin HEAD:snapshots && git push origin "arch/${VERSION}" --force)
          git worktree remove "$SNAP_DIR" --force

      - name: Prune old date-stamped snapshots
        if: steps.version.outputs.is_dated == 'true'
        run: |
          KEEP=10
          git fetch origin snapshots
          SNAP_DIR="/tmp/snapshots-prune"
          rm -rf "$SNAP_DIR"
          git worktree add "$SNAP_DIR" origin/snapshots

          cd "$SNAP_DIR"

          # List date-stamped snapshot dirs, sorted oldest first
          DATED_DIRS=$(ls -d output/[0-9][0-9][0-9][0-9]-[0-9][0-9]-[0-9][0-9] 2>/dev/null | sort)
          COUNT=$(echo "$DATED_DIRS" | grep -c . || true)

          if [ "$COUNT" -gt "$KEEP" ]; then
            TO_DELETE=$((COUNT - KEEP))
            echo "Pruning $TO_DELETE old date-stamped snapshots (keeping $KEEP)..."
            echo "$DATED_DIRS" | head -n "$TO_DELETE" | while read -r dir; do
              DATE_LABEL=$(basename "$dir")
              echo "  Removing: $dir (tag arch/${DATE_LABEL})"
              git rm -rf "$dir"
              git push origin --delete "arch/${DATE_LABEL}" 2>/dev/null || true
            done
            git commit -m "prune: remove old date-stamped snapshots (kept $KEEP)"
            git push origin HEAD:snapshots
          else
            echo "Only $COUNT date-stamped snapshots, nothing to prune (keep $KEEP)"
          fi

          cd /tmp
          git worktree remove "$SNAP_DIR" --force
