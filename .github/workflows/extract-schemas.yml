name: Extract CRD Schemas

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build analyzer
        run: go build -o rhoai-analyzer ./cmd/rhoai-analyzer/

      - name: Clone repos and extract schemas
        shell: bash
        run: |
          set -e
          mkdir -p /tmp/repos

          # Read repos from version-controlled scan-config.yaml
          grep '^ *- ' scan-config.yaml | sed 's/^ *- //' | while read -r full_repo; do
            # Strict validation: only allow org/repo format with safe characters
            if [[ ! "$full_repo" =~ ^[a-zA-Z0-9_.-]+/[a-zA-Z0-9_.-]+$ ]]; then
              echo "[!] Skipping invalid repo name: $full_repo"
              continue
            fi
            repo_name="${full_repo##*/}"
            echo "=== Extracting schemas from $repo_name ==="

            git clone --depth 1 "https://github.com/${full_repo}.git" "/tmp/repos/${repo_name}" 2>/dev/null || {
              echo "WARN: Failed to clone $full_repo, skipping"
              continue
            }

            ./rhoai-analyzer extract-schema "/tmp/repos/${repo_name}" \
              --output-dir contracts/schemas \
              --repo-name "$repo_name" || true
          done

      - name: Check for schema changes
        id: check_changes
        run: |
          git diff --quiet contracts/schemas/ && echo "changed=false" >> "$GITHUB_OUTPUT" || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Create PR with updated schemas
        if: steps.check_changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore: update CRD schemas from upstream repos"
          title: "chore: weekly CRD schema update"
          body: |
            Automated weekly extraction of CRD schemas from all RHOAI repos.
            Review the schema diffs to catch any unannounced CRD changes.
          branch: auto/schema-update
          labels: contracts,automated
