# Platform scan configuration
# Each platform produces its own aggregated architecture analysis and docs section.
# Repos are listed under their GitHub org. The workflow combines org + repo name.
# Go repos get full extraction (22 extractors + CPG). Non-Go repos get partial
# extraction (Dockerfiles, K8s manifests, Helm charts) and multi-language CPG.

platforms:
  odh:
    name: "Open Data Hub"
    description: "Upstream ML platform on Kubernetes"
    repo_overrides:
      opendatahub-operator:
        aliases: ["ODH operator", "odh-operator"]
      odh-dashboard:
        aliases: ["ODH Dashboard"]
      data-science-pipelines-operator:
        aliases: ["DSPO", "dspo"]
      data-science-pipelines:
        aliases: ["DSP", "dsp"]
      odh-model-controller:
        aliases: ["ODH Model Controller", "omc"]
      modelmesh-serving:
        aliases: ["ModelMesh"]
      training-operator:
        aliases: ["Training operator", "Kubeflow Training operator"]
    orgs:
      opendatahub-io:
        # Operators (Go)
        - opendatahub-operator
        - data-science-pipelines-operator
        - model-registry-operator
        - trustyai-service-operator
        - training-operator
        - trainer
        - llama-stack-k8s-operator
        - mlflow-operator
        - spark-operator
        - codeflare-operator
        - kubeflow
        # Core services (Go)
        - odh-dashboard
        - data-science-pipelines
        - model-registry
        - models-as-a-service
        - notebooks
        # Inference (Go)
        - modelmesh-serving
        - odh-model-controller
        # Infrastructure (Go)
        - kube-auth-proxy
        - distributed-workloads
        - kueue
        # AI Safety / Guardrails (Go)
        - fms-guardrails-orchestrator
        # LLM Infrastructure (Go)
        - llm-d-inference-scheduler
        - llm-d-kv-cache
        # Evaluation (Go)
        - eval-hub
        # Batch (Go)
        - argo-workflows
        - batch-gateway
        # Other (Go)
        - workload-variant-autoscaler
        # Non-Go components (partial extraction: Dockerfiles, manifests, CPG)
        - guardrails-detectors        # Python
        - kserve-autogluon-server     # Python
        - llama-stack                 # Python
        - llama-stack-provider-trustyai-garak  # Python
        - lm-evaluation-harness       # Python
        - mlflow                      # Python
        - modelmesh                   # Java
        - vllm                        # Python/C++
      # External upstream dependencies
      kserve:
        - kserve
      ray-project:
        - kuberay
      brancz:
        - kube-rbac-proxy

  rhoai:
    name: "Red Hat OpenShift AI"
    description: "Enterprise ML platform on OpenShift (downstream of ODH)"
    version: "rhoai.next"
    known_versions:
      - "rhoai-2.10"
      - "rhoai-3.0"
      - "rhoai.next"
    ocp_versions:
      min: "4.14"
      max: "4.17"
    repo_overrides:
      opendatahub-operator:
        aliases: ["rhods-operator", "RHODS operator"]
      odh-dashboard:
        aliases: ["RHOAI Dashboard", "rhods-dashboard"]
      data-science-pipelines-operator:
        aliases: ["DSPO", "dspo"]
      data-science-pipelines:
        aliases: ["DSP", "dsp"]
      odh-model-controller:
        aliases: ["ODH Model Controller", "omc"]
      modelmesh-serving:
        aliases: ["ModelMesh"]
      kserve:
        aliases: ["KServe"]
      trustyai-service-operator:
        aliases: ["TrustyAI operator"]
      codeflare-operator:
        aliases: ["CodeFlare operator"]
      model-registry-operator:
        aliases: ["Model Registry operator"]
      training-operator:
        aliases: ["Training operator", "Kubeflow Training operator"]
    orgs:
      red-hat-data-services:
        # Operators (Go, downstream of opendatahub-io)
        - opendatahub-operator
        - data-science-pipelines-operator
        - model-registry-operator
        - trustyai-service-operator
        - training-operator
        - trainer
        - llama-stack-k8s-operator
        - mlflow-operator
        - spark-operator
        - codeflare-operator
        # Core services (Go)
        - odh-dashboard
        - data-science-pipelines
        - model-registry
        - models-as-a-service
        - notebooks
        # Inference (Go)
        - kserve
        - modelmesh-serving
        - odh-model-controller
        # Infrastructure (Go)
        - kube-auth-proxy
        - kube-rbac-proxy
        - kuberay
        - kubeflow
        - distributed-workloads
        - kueue
        # AI Safety / Guardrails (Go)
        - fms-guardrails-orchestrator
        # LLM Infrastructure (Go)
        - llm-d-inference-scheduler
        - llm-d-kv-cache
        # Evaluation (Go)
        - eval-hub
        # Batch (Go)
        - argo-workflows
        - batch-gateway
        # Other (Go)
        - workload-variant-autoscaler
        # Non-Go components (partial extraction: Dockerfiles, manifests, CPG)
        - codeflare-sdk               # Python
        - fms-hf-tuning               # Python
        - vllm-cpu                    # Python/C++
        - lm-evaluation-harness       # Python
        - llama-stack                 # Python
        - MLServer                    # Python
        - NeMo-Guardrails             # Python
        - ai-gateway-payload-processing   # Go
        - caikit                      # Python
        - caikit-nlp                  # Python
        - caikit-tgis-serving         # Python
        - feast                       # Python/Go
        - guardrails-regex-detector   # Rust
        - llm-d-routing-sidecar       # Go
        - ml-metadata                 # C++
        - model-metadata-collection   # Python
        - modelmesh-runtime-adapter   # Java
        - notebooks-downstream        # Various
        - odh-cli                     # Go
        - odh-deployer                # Shell
        - openvino_model_server       # Python/C++
        - pipelines-components        # Python
        - rest-proxy                  # Go
        - rhds-llama-stack-distribution   # Python
        - rhods-operator              # Go (downstream of opendatahub-operator)
        - text-generation-inference   # Rust/Python
        - trustyai-explainability     # Java
        - vllm-gaudi                  # Python
        - vllm-orchestrator-gateway   # Rust
        - vllm-rocm                   # Python
        - vllm-spyre                  # Python
      kubernetes-sigs:
        - gateway-api-inference-extension # Go
      IBM:
        - ai4rag                      # Python
      llm-d:
        - llm-d                       # Go
