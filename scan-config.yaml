# Platform scan configuration
# Each platform produces its own aggregated architecture analysis and docs section.
# Repos are listed under their GitHub org. The workflow combines org + repo name.
# Aligned with opendatahub-io/architecture-context platforms.yaml.

platforms:
  odh:
    name: "Open Data Hub"
    description: "Upstream ML platform on Kubernetes"
    repo_overrides:
      opendatahub-operator:
        aliases: ["ODH operator", "odh-operator"]
      odh-dashboard:
        aliases: ["ODH Dashboard"]
      data-science-pipelines-operator:
        aliases: ["DSPO", "dspo"]
      data-science-pipelines:
        aliases: ["DSP", "dsp"]
      odh-model-controller:
        aliases: ["ODH Model Controller", "omc"]
      modelmesh-serving:
        aliases: ["ModelMesh"]
      training-operator:
        aliases: ["Training operator", "Kubeflow Training operator"]
    orgs:
      opendatahub-io:
        # Operators
        - opendatahub-operator
        - data-science-pipelines-operator
        - model-registry-operator
        - trustyai-service-operator
        - training-operator
        - trainer
        - llama-stack-k8s-operator
        - mlflow-operator
        - spark-operator
        - codeflare-operator
        - kubeflow
        # Core services
        - odh-dashboard
        - data-science-pipelines
        - model-registry
        - models-as-a-service
        - notebooks
        # Inference
        - modelmesh-serving
        - odh-model-controller
        - kserve-autogluon-server
        - modelmesh
        # Infrastructure
        - kube-auth-proxy
        - distributed-workloads
        - kueue
        # AI Safety / Guardrails
        - fms-guardrails-orchestrator
        - guardrails-detectors
        # LLM Infrastructure
        - llm-d-inference-scheduler
        - llm-d-kv-cache
        # Evaluation
        - eval-hub
        - lm-evaluation-harness
        # Batch
        - argo-workflows
        - batch-gateway
        # Other
        - workload-variant-autoscaler
        - llama-stack
        - llama-stack-provider-trustyai-garak
        - mlflow
      # External upstream
      kserve:
        - kserve
      ray-project:
        - kuberay
      brancz:
        - kube-rbac-proxy
      llm-d:
        - llm-d
      kubernetes-sigs:
        - gateway-api-inference-extension
      IBM:
        - ai4rag

  rhoai:
    name: "Red Hat OpenShift AI"
    description: "Enterprise ML platform on OpenShift (downstream of ODH)"
    version: "rhoai.next"
    known_versions:
      - "rhoai-2.10"
      - "rhoai-3.0"
      - "rhoai.next"
    ocp_versions:
      min: "4.14"
      max: "4.17"
    repo_overrides:
      rhods-operator:
        aliases: ["opendatahub-operator", "RHODS operator"]
      odh-dashboard:
        aliases: ["RHOAI Dashboard", "rhods-dashboard"]
      data-science-pipelines-operator:
        aliases: ["DSPO", "dspo"]
      data-science-pipelines:
        aliases: ["DSP", "dsp"]
      odh-model-controller:
        aliases: ["ODH Model Controller", "omc"]
      modelmesh-serving:
        aliases: ["ModelMesh"]
      kserve:
        aliases: ["KServe"]
      trustyai-service-operator:
        aliases: ["TrustyAI operator"]
      codeflare-operator:
        aliases: ["CodeFlare operator"]
      model-registry-operator:
        aliases: ["Model Registry operator"]
      training-operator:
        aliases: ["Training operator", "Kubeflow Training operator"]
    orgs:
      red-hat-data-services:
        # Operators (downstream forks of opendatahub-io)
        - rhods-operator
        - data-science-pipelines-operator
        - model-registry-operator
        - trustyai-service-operator
        - training-operator
        - trainer
        - llama-stack-k8s-operator
        - mlflow-operator
        - spark-operator
        - codeflare-operator
        - kubeflow
        # Core services
        - odh-dashboard
        - data-science-pipelines
        - model-registry
        - models-as-a-service
        - notebooks
        # Inference
        - kserve
        - modelmesh-serving
        - odh-model-controller
        # Infrastructure
        - kube-auth-proxy
        - kube-rbac-proxy
        - kuberay
        - distributed-workloads
        - kueue
        # AI Safety / Guardrails
        - fms-guardrails-orchestrator
        # LLM Infrastructure
        - llm-d-inference-scheduler
        - llm-d-kv-cache
        - llm-d-routing-sidecar
        # Evaluation
        - eval-hub
        - lm-evaluation-harness
        # Batch
        - argo-workflows
        - batch-gateway
        # Other
        - workload-variant-autoscaler
        - llama-stack
        # RHOAI-specific components (not in ODH)
        - rhods-operator
        - notebooks-downstream
        - odh-cli
        - odh-deployer
        - codeflare-sdk
        - fms-hf-tuning
        - caikit-nlp
        - caikit-tgis-serving
        - MLServer
        - NeMo-Guardrails
        - guardrails-regex-detector
        - modelmesh-runtime-adapter
        - trustyai-explainability
        - openvino_model_server
        - text-generation-inference
        - ml-metadata
        - model-metadata-collection
        - pipelines-components
        - rest-proxy
        - ai-gateway-payload-processing
        - rhds-llama-stack-distribution
        - feast
        - vllm-cpu
        - vllm-gaudi
        - vllm-rocm
        - vllm-spyre
        - vllm-orchestrator-gateway
      kubernetes-sigs:
        - gateway-api-inference-extension
      IBM:
        - ai4rag
      llm-d:
        - llm-d
