# Platform scan configuration
# Each platform produces its own aggregated architecture analysis and docs section.
# Repos are listed under their GitHub org. The workflow combines org + repo name.
# Only Go-based repos are included (the analyzer extracts from Go source).

platforms:
  odh:
    name: "Open Data Hub"
    description: "Upstream ML platform on Kubernetes"
    orgs:
      opendatahub-io:
        # Operators
        - opendatahub-operator
        - data-science-pipelines-operator
        - model-registry-operator
        - trustyai-service-operator
        - training-operator
        - trainer
        - llama-stack-k8s-operator
        - mlflow-operator
        - spark-operator
        - codeflare-operator
        - kubeflow
        # Core services
        - odh-dashboard
        - data-science-pipelines
        - model-registry
        - models-as-a-service
        - notebooks
        # Inference
        - modelmesh-serving
        - odh-model-controller
        # Infrastructure
        - kube-auth-proxy
        - distributed-workloads
        - kueue
        # AI Safety / Guardrails
        - fms-guardrails-orchestrator
        # LLM Infrastructure
        - llm-d-inference-scheduler
        - llm-d-kv-cache
        # Evaluation
        - eval-hub
        # Batch
        - argo-workflows
        - batch-gateway
        # Other
        - workload-variant-autoscaler
      # External upstream dependencies
      kserve:
        - kserve
      ray-project:
        - kuberay
      brancz:
        - kube-rbac-proxy

  rhoai:
    name: "Red Hat OpenShift AI"
    description: "Enterprise ML platform on OpenShift (downstream of ODH)"
    ocp_versions:
      min: "4.14"
      max: "4.17"
    orgs:
      red-hat-data-services:
        # Operators (downstream of opendatahub-io)
        - opendatahub-operator
        - data-science-pipelines-operator
        - model-registry-operator
        - trustyai-service-operator
        - training-operator
        - trainer
        - llama-stack-k8s-operator
        - mlflow-operator
        - spark-operator
        - codeflare-operator
        # Core services
        - odh-dashboard
        - data-science-pipelines
        - model-registry
        - models-as-a-service
        - notebooks
        # Inference
        - kserve
        - modelmesh-serving
        - odh-model-controller
        # Infrastructure
        - kube-auth-proxy
        - kube-rbac-proxy
        - kuberay
        - kubeflow
        - distributed-workloads
        - kueue
        # AI Safety / Guardrails
        - fms-guardrails-orchestrator
        # LLM Infrastructure
        - llm-d-inference-scheduler
        - llm-d-kv-cache
        # Evaluation
        - eval-hub
        # Batch
        - argo-workflows
        - batch-gateway
        # Other
        - workload-variant-autoscaler
