site_name: Architecture Analyzer
site_url: https://ugiordan.github.io/architecture-analyzer
repo_url: https://github.com/ugiordan/architecture-analyzer
repo_name: ugiordan/architecture-analyzer
edit_uri: edit/main/site/docs/

copyright: Copyright &copy; Red Hat, Inc.

theme:
  name: material
  language: en
  favicon: images/favicon.ico
  logo: images/logo.svg
  icon:
    repo: fontawesome/brands/github
  font:
    text: Red Hat Text
    code: Red Hat Mono
  palette:
    - scheme: default
      primary: black
      toggle:
        icon: material/brightness-4
        name: Switch to dark mode
    - scheme: slate
      primary: black
      toggle:
        icon: material/brightness-7
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.top
    - navigation.indexes
    - navigation.instant
    - navigation.path
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - toc.follow

plugins:
  - search
  - glightbox:
      touchNavigation: true
      loop: false
      zoomable: true
  - git-revision-date-localized:
      enable_creation_date: true

extra:
  social:
    - icon: fontawesome/brands/github
      name: Architecture Analyzer on GitHub
      link: https://github.com/ugiordan/architecture-analyzer

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - https://unpkg.com/cytoscape@3.30.4/dist/cytoscape.min.js
  - javascripts/cytoscape-topology.js
  - javascripts/diagram-zoom.js

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.snippets
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.tasklist:
      custom_checkbox: true

nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting-started/installation.md
    - Quick Start: getting-started/quickstart.md
    - Scan Configuration: getting-started/scan-config.md
