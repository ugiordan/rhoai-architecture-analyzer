apiVersion: v1
kind: Service
metadata:
  name: opendatahub-operator-webhook-service
  namespace: opendatahub-operator-system
  annotations:
    service.beta.openshift.io/serving-cert-secret-name: webhook-server-cert
spec:
  type: ClusterIP
  selector:
    app: opendatahub-operator
  ports:
    - name: https
      port: 8443
      targetPort: 8443
      protocol: TCP
    - name: metrics
      port: 8080
      targetPort: 8080
      protocol: TCP
